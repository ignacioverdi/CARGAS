<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cargas · Cuenta corriente</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1f3b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cargas">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eceef6; --bg-2:#e3e6f2; --card:#ffffff; --ink:#171a2b; --ink-2:#3b3f55;
    --muted:#797f9b; --line:#e7e9f3; --line-2:#eef0f7;
    --brand:#5b4bff; --brand-2:#8a7bff;
    --pos:#08b67a; --pos-soft:#e7f8f0; --neg:#ff486a; --neg-soft:#ffe9ee; --amber:#ff9f1c;
    --panel-1:#1c1f3b; --panel-2:#3a2a73; --panel-3:#5b4bff;
    --shadow:0 18px 40px -26px rgba(28,31,59,.55);
    --shadow-sm:0 8px 22px -18px rgba(28,31,59,.5);
    --r:18px;
    --disp:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
    --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:
    radial-gradient(1200px 500px at 80% -10%, #e9e6ff 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 0%, #e2f3ff 0%, transparent 55%), var(--bg);
    color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{max-width:1360px;margin:0 auto;padding:0 0 110px}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  .neg{color:var(--neg)} .pos{color:var(--pos)}

  header{position:sticky;top:0;z-index:25;padding:16px 16px 8px;
    background:linear-gradient(var(--bg),var(--bg) 78%,transparent)}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
    display:grid;place-items:center;color:#fff;font-family:var(--disp);font-weight:700;font-size:15px;box-shadow:0 6px 16px -6px var(--brand)}
  .brand h1{font-family:var(--disp);font-size:19px;font-weight:700;letter-spacing:-.02em}
  .brand .acct{margin-left:auto;font-size:12px;color:var(--brand);font-weight:700;border:1px solid #dcd8ff;padding:4px 10px;border-radius:999px;background:#f3f1ff}
  .acctline{font-size:12px;color:var(--muted);margin-top:5px}
  .tabs{display:flex;gap:6px;margin-top:12px;background:#e6e8f4;padding:4px;border-radius:13px;width:fit-content}
  .tab{font:inherit;font-weight:700;font-size:13.5px;color:var(--muted);background:transparent;border:none;padding:8px 16px;border-radius:10px;cursor:pointer;transition:.15s}
  .tab.on{background:var(--card);color:var(--ink);box-shadow:0 4px 12px -6px rgba(28,31,59,.4)}
  .gj{font-size:11.5px;color:var(--muted);font-weight:600}
  @media(min-width:720px){.gboard{grid-template-columns:minmax(0,1fr) 230px}}
  .gtable{font-size:12.5px;table-layout:auto}
  .gtable th,.gtable td{padding:9px 8px}
  .gtable td.r,.gtable th.r{padding-right:12px}
  .gtable thead .grp th{background:#1c1f3b;color:#fff;text-align:center;font-size:10px;letter-spacing:.08em;padding:8px}
  .gtable thead .grp .clih{background:#15172b}
  .gtable thead .grp .vgrp{background:linear-gradient(180deg,#4a4bd6,#3b3bb0)}
  .gtable thead .grp .sgrp{background:linear-gradient(180deg,#119d6a,#0e8459)}
  .gtable thead tr:last-child th{position:sticky;top:0;background:#23274a;color:#c7c3ec;font-size:9.5px;letter-spacing:.04em;white-space:nowrap}
  .gtable tbody td{white-space:nowrap;font-weight:600}
  .gtable .gname{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
  .gtable .gdot{width:9px;height:9px;border-radius:3px;flex:none}
  .gtable td.mio{color:var(--neg);font-weight:700}
  .gtable td.cli{color:var(--muted)}
  .gtable td.gtot{font-weight:800;background:#fbf7e9}
  .gtable td.vsep{border-left:2px solid #e3e6f4}
  .gtable tfoot td{background:linear-gradient(180deg,#1c1f3b,#23274a);color:#fff;font-size:12.5px}
  .gtable tfoot td.gtot{background:#2a2d52;color:#ffe08a}

  .wrap{padding:0 16px}

  .paybar{position:sticky;top:92px;z-index:20;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px;
    box-shadow:var(--shadow);display:grid;grid-template-columns:1fr 112px auto;gap:8px;align-items:center;margin:8px 0}
  .paybar .lbl{grid-column:1/4;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:0}
  .paybar input{font:inherit;font-size:16px;font-weight:600;padding:11px 12px;border:1.5px solid var(--line);border-radius:12px;background:#fbfbff;min-width:0;width:100%}
  .paybar input:focus{outline:none;border-color:var(--brand-2)}
  .paybar button{font:inherit;font-weight:700;font-size:14px;background:linear-gradient(135deg,var(--pos),#0aa86f);color:#fff;border:none;border-radius:12px;padding:12px 18px;cursor:pointer;white-space:nowrap;box-shadow:0 10px 20px -10px var(--pos)}
  .paybar button:active{transform:scale(.97)}
  .paybar select{grid-column:1/4;font:inherit;font-weight:600;font-size:14px;padding:9px 10px;border:1.5px solid var(--line);border-radius:11px;background:#fbfbff;color:var(--ink)}

  .toolbar{display:flex;align-items:center;gap:8px;margin:14px 2px 6px}
  .toolbar .sortbtn{font:inherit;font-size:12px;font-weight:700;color:var(--brand);background:#f3f1ff;border:1px solid #e4e0ff;border-radius:999px;padding:5px 11px;cursor:pointer}
  .toolbar .cnt{font-size:12px;color:var(--muted);font-weight:600;margin-left:auto}

  .board{display:grid;grid-template-columns:1fr;gap:14px;margin-top:2px}
  @media(min-width:720px){.board{grid-template-columns:1fr 264px;align-items:start}}

  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .tscroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#23274a,#1c1f3b);text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:#b9b4e6;font-weight:700;padding:13px 14px}
  thead th.r{text-align:right}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line-2);white-space:nowrap;font-weight:600;vertical-align:middle}
  tbody td.r{text-align:right}
  tbody tr{cursor:pointer;transition:background .14s}
  tbody tr:hover{background:#f8f7ff}
  tbody tr.ok{background:linear-gradient(90deg,var(--pos-soft),transparent 55%)}
  .cli{display:flex;align-items:center;gap:11px}
  .av{width:36px;height:36px;border-radius:11px;color:#fff;font-family:var(--disp);font-weight:600;font-size:13px;display:grid;place-items:center;flex:none;box-shadow:0 6px 14px -8px rgba(28,31,59,.6)}
  .cliinfo{min-width:0}
  .nm{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:172px}
  .bar{width:120px;height:5px;border-radius:999px;background:#e9ebf5;margin-top:6px;overflow:hidden}
  .bar span{display:block;height:100%;background:linear-gradient(90deg,#08b67a,#46d6a5);border-radius:999px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .bar.full span{background:linear-gradient(90deg,#5b4bff,#8a7bff)}
  .tot{color:var(--ink-2)}
  .mut{color:var(--muted)}
  .pill{display:inline-block;min-width:74px;text-align:right;padding:6px 12px;border-radius:999px;font-weight:800;font-size:13.5px;background:var(--neg-soft);color:var(--neg)}
  .pill.ok{background:var(--pos-soft);color:var(--pos)}
  tfoot td{padding:14px;font-weight:800;font-size:14px;background:linear-gradient(180deg,#1c1f3b,#23274a);color:#fff}
  tfoot td.r{text-align:right}
  tfoot .ft-deb{color:#ff9bb0}
  .empty{text-align:center;color:var(--muted);padding:34px 16px;font-size:14px}
  /* texto centrado en ambas tablas */
  thead th,thead th.r,tbody td,tbody td.r,tfoot td,tfoot td.r{text-align:center}
  .cli{justify-content:center}
  .nm{max-width:none}
  .bar{margin:6px auto}
  .gtable .gname{justify-content:center}
  .pill{text-align:center}
  .paybtn{font:inherit;font-weight:700;font-size:12.5px;border:1.5px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;padding:7px 15px;cursor:pointer;transition:.15s}
  .paybtn:active{transform:scale(.96)}
  .paybtn.paid{background:var(--pos-soft);color:var(--pos);border-color:transparent}
  #monthSel{font:inherit;font-weight:700;font-size:13px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:8px 12px;cursor:pointer}
  .tabs{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{flex:0 0 auto;white-space:nowrap}
  .search{width:100%;font-size:15px;padding:11px 14px;border:1.5px solid var(--line);border-radius:13px;background:var(--card);font-weight:600;margin:2px 0 10px}
  .search:focus{outline:none;border-color:var(--brand-2)}
  .cobcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .cobrow{display:flex;align-items:center;gap:11px;padding:12px 13px;border-top:1px solid var(--line-2)}
  .cobrow:first-child{border-top:none}
  .cobrow .who{flex:1;min-width:0;cursor:pointer}
  .cobrow .who .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cobrow .who .db{font-weight:800;font-size:18px;color:var(--neg);margin-top:1px}
  .cobrow .acts{display:flex;gap:7px;flex:none}
  .cobrow .wa,.cobrow .pay{font:inherit;font-weight:700;font-size:13px;border:none;border-radius:11px;padding:10px 12px;cursor:pointer}
  .cobrow .wa{background:#e7f8f0;color:#0a8f5b}
  .cobrow .pay{background:linear-gradient(135deg,var(--pos),#0aa86f);color:#fff}
  .cobrow .wa:active,.cobrow .pay:active{transform:scale(.95)}
  .bigpay{width:100%;font:inherit;font-weight:800;font-size:16px;background:linear-gradient(135deg,var(--pos),#0aa86f);color:#fff;border:none;border-radius:13px;padding:14px;cursor:pointer;margin-top:6px}
  .wabtn{width:100%;font:inherit;font-weight:700;font-size:15px;background:#e7f8f0;color:#0a8f5b;border:none;border-radius:13px;padding:13px;cursor:pointer;margin-top:8px}
  .cajawrap{max-width:560px;margin:0 auto}
  .daynav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:7px 9px;margin-bottom:12px;box-shadow:var(--shadow)}
  .daynav button{background:#f3f1ff;border:none;border-radius:10px;width:40px;height:40px;font-size:22px;line-height:1;cursor:pointer;color:var(--brand);font-weight:700}
  .daynav .dl{font-weight:700;font-size:15px;text-transform:capitalize}
  .cajagrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .minicard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;box-shadow:var(--shadow)}
  .minicard .k{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .minicard .v{font-weight:800;font-size:18px;margin-top:3px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--shadow);margin-bottom:12px}
  .card h3{font-family:var(--disp);font-size:16px;margin-bottom:8px}
  .arow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line-2)}
  .arow:first-of-type{border-top:none}
  .arow.edit{cursor:pointer}
  .arow .l{font-size:14px;color:var(--ink);font-weight:600}
  .arow .l small{display:block;color:var(--muted);font-weight:500;font-size:11.5px;margin-top:1px}
  .arow .v{font-weight:700;font-size:15px;text-align:right}
  .arow input.ci{width:118px;text-align:right;font:inherit;font-weight:700;font-size:15px;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;background:#fbfbff}
  .arow input.ci:focus{outline:none;border-color:var(--brand-2)}
  .totrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0 2px;border-top:2px solid var(--ink);margin-top:6px}
  .totrow .l{font-weight:800;font-size:15px}
  .totrow .v{font-weight:800;font-size:24px;font-family:var(--disp)}
  .difbox{border-radius:12px;padding:11px 13px;margin-top:10px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .difbox.ok{background:var(--pos-soft);color:var(--pos)}
  .difbox.bad{background:#fdecec;color:var(--neg)}
  .difbox.warn{background:#fff6e6;color:#b5760a}
  .movrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-top:1px solid var(--line-2);font-size:13.5px}
  .movrow:first-child{border-top:none}
  .movrow .mc{font-weight:600}
  .movrow .mc small{color:var(--muted);font-weight:500}
  .addbtn{width:100%;font:inherit;font-weight:700;font-size:13.5px;background:#f3f1ff;color:var(--brand);border:none;border-radius:11px;padding:11px;cursor:pointer;margin-top:8px}
  .billgrid{display:grid;grid-template-columns:1fr 70px 1fr;gap:8px 10px;align-items:center}
  .billgrid .bd{font-weight:700}
  .billgrid input{width:100%;text-align:center;font:inherit;font-weight:700;border:1.5px solid var(--line);border-radius:9px;padding:7px;background:#fbfbff}
  .billgrid input:focus{outline:none;border-color:var(--brand-2)}
  .billgrid .bs{text-align:right;color:var(--muted);font-weight:600;font-size:13px}
  .segctl{display:flex;gap:6px}
  .segctl button{flex:1;font:inherit;font-weight:700;font-size:13px;border:1.5px solid var(--line);background:var(--card);color:var(--muted);border-radius:10px;padding:9px 6px;cursor:pointer}
  .segctl button.on{background:var(--brand);color:#fff;border-color:transparent}

  .saldos{background:linear-gradient(160deg,var(--panel-1),var(--panel-2));color:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .saldos::after{content:"";position:absolute;width:180px;height:180px;right:-60px;top:-60px;background:radial-gradient(circle,rgba(139,123,255,.5),transparent 70%)}
  .saldos h2{font-family:var(--disp);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#b9b4e6;font-weight:600;margin-bottom:10px;position:relative}
  .hero{position:relative;margin-bottom:6px}
  .hero .l{font-size:12.5px;color:#cdc9f0}
  .hero .n{font-family:var(--disp);font-weight:700;font-size:31px;letter-spacing:-.02em;margin-top:2px}
  .hero .n.zero{color:#7ef0bf}
  .srow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.09);position:relative}
  .srow:last-child{border-bottom:none}
  .srow .l{font-size:12.5px;color:#cdc9f0;display:flex;align-items:center;gap:7px}
  .srow .l .ico{width:6px;height:6px;border-radius:50%}
  .srow .n{font-weight:700;font-size:15px}
  .srow.edit{cursor:pointer;border-radius:10px;margin:2px -8px;padding:11px 8px}
  .srow.edit:hover{background:rgba(255,255,255,.06)}
  .srow.edit .n{display:flex;align-items:center;gap:7px}
  .srow.edit .pencil{font-size:11px;color:#b9b4e6;font-weight:600}
  .divlbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#8d88c0;margin:10px 0 -2px;position:relative}
  .saldos .foot{margin-top:12px;font-size:11.5px;color:#9b96cf;border-top:1px solid rgba(255,255,255,.09);padding-top:9px;position:relative}

  .scrim{position:fixed;inset:0;background:rgba(18,20,38,.5);backdrop-filter:blur(3px);z-index:40;display:none;align-items:flex-end;justify-content:center}
  .scrim.on{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:680px;border-radius:22px 22px 0 0;max-height:90vh;overflow:auto;padding:8px 16px 28px;animation:up .24s cubic-bezier(.2,.8,.2,1)}
  @keyframes up{from{transform:translateY(34px);opacity:.5}to{transform:none;opacity:1}}
  .grab{width:40px;height:4px;background:#cfd2e3;border-radius:999px;margin:8px auto 14px}
  .sheet h3{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:-.02em}
  .tdd{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:14px 0}
  .tdd>div{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px}
  .tdd .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  .tdd .v{font-size:16px;font-weight:800;margin-top:4px}
  .mrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:10px}
  .mrow .d{font-size:13px;color:var(--ink-2);font-weight:600} .mrow .d small{display:block;color:var(--muted);font-size:11.5px;font-weight:500}
  .xbtn{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:2px 6px;line-height:1}
  .field{display:block;margin:13px 0 5px;font-size:12px;font-weight:700;color:var(--ink-2)}
  input[type=text],input[type=number],textarea{width:100%;font:inherit;font-size:16px;font-weight:600;padding:12px;border:1.5px solid var(--line);border-radius:12px;background:var(--card)}
  input:focus,textarea:focus{outline:none;border-color:var(--brand-2)}
  .hint{color:var(--muted);font-size:13px;font-weight:500;margin:6px 0 2px;line-height:1.4}
  .seg{display:flex;gap:8px;margin-top:8px}
  .seg button{flex:1;padding:12px;border:1.5px solid var(--line);background:var(--card);border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;color:var(--ink)}
  .seg button.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
  .seg button.go{background:linear-gradient(135deg,var(--pos),#0aa86f);color:#fff;border-color:transparent}
  .menulist{list-style:none}
  .menulist li{padding:16px 4px;border-bottom:1px solid var(--line);font-size:15.5px;font-weight:600;cursor:pointer}
  .pasta{min-height:120px;font:13px/1.4 ui-monospace,Menlo,Consolas,monospace;font-weight:500}
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:30;display:flex;gap:8px}
  .fab .btn{font:inherit;font-weight:700;font-size:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;padding:13px 20px;cursor:pointer;box-shadow:0 14px 28px -12px var(--brand)}
  .fab .btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .toast{position:fixed;left:50%;bottom:82px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 17px;border-radius:13px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:50;pointer-events:none;max-width:90%;text-align:center;box-shadow:var(--shadow)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .filein{display:none}
  #login{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#1c1f3b,#3a2a73)}
  #login.on{display:flex}
  .loginbox{background:var(--card);border-radius:22px;padding:30px 24px;width:min(360px,90vw);text-align:center;box-shadow:0 30px 60px -20px rgba(0,0,0,.5)}
  .loginbox .llogo{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;font-family:var(--disp);font-weight:700;font-size:26px;margin:0 auto 14px}
  .loginbox h2{font-family:var(--disp);font-size:24px;font-weight:700}
  .loginbox p{color:var(--muted);font-size:13.5px;margin:4px 0 18px}
  .loginbox input{width:100%;font-size:16px;padding:13px;border:1.5px solid var(--line);border-radius:12px;background:#fbfbff;margin-bottom:10px;font-weight:600}
  .loginbox input:focus{outline:none;border-color:var(--brand-2)}

function catVenta(prod){const p=(prod||"").trim().toUpperCase();if(p.startsWith("SUBE"))return "sube";if(p.startsWith("RECARGAS"))return "virtual";return "otro";}
function parseVentas(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);if(!lines.length)return[];
  // separador: ; (export pinweb)
  const sep=lines[0].includes(";")?";":",";
  const split=l=>sep===";"?l.split(";"):splitCSVLine(l);
  let hi=lines.findIndex(l=>/jpdv/i.test(l)&&/pvp/i.test(l));if(hi<0)hi=0;
  const head=split(lines[hi]).map(h=>h.trim().toUpperCase());
  const ci=n=>head.findIndex(h=>h===n||h.startsWith(n));
  const cId=ci("ID"),cF=ci("FECHA"),cJ=ci("JPDV"),cP=ci("PRODUCTO"),cV=ci("PVP"),cGD=ci("GD"),cGJ=ci("GJ");
  const out=[];for(let i=hi+1;i<lines.length;i++){const r=split(lines[i]);if(r.length<Math.max(cV,cGD,cGJ)+1)continue;
    const id=(r[cId]||"").trim();const cli=(r[cJ]||"").trim();if(!cli)continue;
    out.push({id,fecha:(r[cF]||"").trim(),cli,prod:(r[cP]||"").trim(),pvp:parseMoney(r[cV]),gd:parseMoney(r[cGD]),gj:parseMoney(r[cGJ])});}

    if(c==="virtual"){a.vV+=v.pvp;a.gdV+=v.gd;a.gjV+=v.gj;}
    else if(c==="sube"){a.vS+=v.pvp;a.gdS+=v.gd;a.gjS+=v.gj;}
    a.items.push(v);}
  const arr=[...map.values()];arr.forEach(a=>{
    a.totV=a.gdV+a.gjV;a.totS=a.gdS+a.gjS;a.tot=a.totV+a.totS;a.venta=a.vV+a.vS;

function splitCSVLine(line){const out=[];let cur="",q=false;for(let i=0;i<line.length;i++){const c=line[i];
  if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){out.push(cur);cur="";}else cur+=c;}out.push(cur);return out;}
function parseCSV(text){const lines=text.split(/\r?\n/).filter(l=>l.trim().length);if(!lines.length)return[];
  let hi=lines.findIndex(l=>/fecha/i.test(l)&&/importe/i.test(l));if(hi<0)hi=0;
  const head=splitCSVLine(lines[hi]).map(h=>h.trim().toLowerCase());const col=n=>head.findIndex(h=>h===n);
  const cF=col("fecha"),cD=head.findIndex(h=>h.startsWith("descrip")),cO=col("observaciones"),cOt=col("otorga"),cR=col("recibe"),cI=col("importe");
  const out=[];for(let i=hi+1;i<lines.length;i++){const r=splitCSVLine(lines[i]);const fecha=(r[cF]||"").trim();
    if(!/\d{2}\/\d{2}\/\d{4}/.test(fecha))continue;
    out.push({fecha,desc:(r[cD]||"").trim(),obs:cO>=0?(r[cO]||"").trim():"",otorga:(r[cOt]||"").trim(),recibe:(r[cR]||"").trim(),importe:parseMoney(r[cI])});}

function monthOf(f){const m=/(\d{1,2})\/(\d{1,2})\/(\d{4})/.exec(f||"");return m?m[3]+"-"+String(m[2]).padStart(2,'0'):"";}
function monthLabel(mk){const n=["","enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];const[y,m]=mk.split("-");return n[+m]+" "+y;}
function nextMonth5(mk){let[y,m]=mk.split("-").map(Number);m++;if(m>12){m=1;y++;}return "5/"+String(m).padStart(2,'0')+"/"+y;}
function availableMonths(){const s=new Set([BASE_MONTH]);for(const v of state.ventas){const mk=monthOf(v.fecha);if(mk)s.add(mk);}return [...s].sort().reverse();}
function ganAPagarMonth(mk){
  const map=new Map();
  const get=(name)=>{const k=key(name);if(!map.has(k))map.set(k,{key:k,name:dispName(k)||name,vV:0,vS:0});return map.get(k);};
  if(mk===BASE_MONTH){for(const kk in state.ganOpening){const o=state.ganOpening[kk];const a=get(o.name);a.vV+=o.vV;a.vS+=o.vS;}}
  for(const v of state.ventas){if(monthOf(v.fecha)!==mk)continue;const a=get(v.cli);const c=catVenta(v.prod);if(c==="virtual")a.vV+=v.pvp;else if(c==="sube")a.vS+=v.pvp;}
  const rows=[];
  for(const a of map.values()){const cf=clientConf(a.key);const inV=cf.virtMode==="pct",inS=cf.subeMode==="pct";if(!inV&&!inS)continue;
    const comV=inV?a.vV*(cf.virtPct||0):0, comS=inS?a.vS*(cf.subePct||0):0;
    rows.push({key:a.key,name:a.name,comV,comS,total:comV+comS,inV,inS});}
  return rows.sort((a,b)=>b.total-a.total);
}

function nameFor(k){
  if(state.clientes[k]&&state.clientes[k].name)return state.clientes[k].name;
  if(CANON[k])return CANON[k];
  if(state.opening[k]&&state.opening[k].name)return state.opening[k].name;
  if(state.ganOpening[k]&&state.ganOpening[k].name)return state.ganOpening[k].name;
  const v=state.ventas.find(x=>key(x.cli)===k);if(v)return v.cli;
  const m=state.movs.find(x=>key(x.recibe)===k);if(m)return m.recibe;
  return k;
}
function allClientKeys(){
  const set=new Set();
  for(const k in state.opening)set.add(k);
  for(const k in state.ganOpening)set.add(k);
  for(const v of state.ventas){const k=key(v.cli);if(k)set.add(k);}
  for(const m of state.movs){const t=tipoOf(m);if(t==="acreditacion"||t==="devolucion"){const k=key(m.recibe);if(k)set.add(k);}}
  for(const k in state.clientes)set.add(k);
  return [...set].filter(k=>k&&k!==seller);
}
function pctTxt(p){return (+(p*100).toFixed(4)).toString();}

}

function diaNombre(d){const m=/(\d{1,2})\/(\d{1,2})\/(\d{4})/.exec(d||"");if(!m)return"";const dt=new Date(+m[3],+m[2]-1,+m[1]);return ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"][dt.getDay()]||"";}
function cierreInfo(k){
  const c=clientsAgg().find(x=>x.key===k);if(!c)return null;
  let lastDay=null,lastTs=-1;
  for(const v of state.ventas){if(key(v.cli)!==k)continue;const d=dayOf(v.fecha);if(!d)continue;const ts=parseTs(d+" 00:00:00");if(ts>lastTs){lastTs=ts;lastDay=d;}}
  let V=0,S=0;
  if(lastDay)for(const v of state.ventas){if(key(v.cli)!==k)continue;if(dayOf(v.fecha)!==lastDay)continue;const cat=catVenta(v.prod);if(cat==="virtual")V+=v.pvp;else if(cat==="sube")S+=v.pvp;}
  return {c,lastDay,V,S,D:c.debe,deuda:c.debe-V-S};
}
function cierreMsg(k){
  const i=cierreInfo(k);if(!i)return"";
  const dia=diaNombre(i.lastDay);const f=n=>Math.round(n||0).toLocaleString("es-AR");
  const total=i.V+i.S;
  return `venta virtual ${dia}: ${f(i.V)}\nventa sube ${dia}: ${f(i.S)}\n\nTOTAL A PAGAR: ${f(total)}\n\nMe lo mandás por favor? Gracias! 🙏`;
}
function cierreLink(k){const ct=state.contacts[k]||{};const ph=(ct.phone||"").replace(/\D/g,"");return (ph?`https://wa.me/${ph}`:"https://wa.me/")+`?text=${encodeURIComponent(cierreMsg(k))}`;}

// ---- Pagos de Mercado Pago (match por CUIT) ----
function fechaToStr(d){const m=/(\d{4})-(\d{2})-(\d{2})/.exec(d||"");return m?`${m[3]}/${m[2]}/${m[1]} 00:00:00`:(d||nowStr());}
async function applyMPcobros(arr){
  if(!Array.isArray(arr))return {aplic:0,nuevos:0,ign:0,dup:0};
  const seen=new Set(state.pagos.filter(p=>p.mpId).map(p=>String(p.mpId)));
  const inboxIds=new Set(state.mpInbox.map(x=>String(x.id)));
  let aplic=0,nuevos=0,ign=0,dup=0;
  for(const p of arr){
    const id=String(p.id||"");const cuit=String(p.cuit||"");const monto=+p.monto||0;const fecha=p.fecha||"";
    if(!id||!monto)continue;
    if(seen.has(id)||inboxIds.has(id)){dup++;continue;}
    const map=cuit?state.mpMap[cuit]:null;
    if(map==="__IGN__"){ign++;continue;}
    if(map){const c=clientsAgg().find(x=>x.key===map);const nm=c?c.name:(dispName(map)||map);
      state.pagos.push({id:"p"+Date.now()+Math.random().toString(36).slice(2,6),name:nm,importe:monto,fecha:fechaToStr(fecha),metodo:"mp",mpId:id,mpCuit:cuit});
      seen.add(id);aplic++;
    }else{state.mpInbox.push({id,fecha,monto,cuit});inboxIds.add(id);nuevos++;}
  }
  if(aplic||nuevos)await save();
  return {aplic,nuevos,ign,dup};
}
async function importMP(text){
  let arr;try{arr=JSON.parse(text);}catch(e){toast("Archivo inválido");return;}
  if(!Array.isArray(arr)){toast("Formato inesperado");return;}
  const {aplic,nuevos,ign,dup}=await applyMPcobros(arr);
  closeSheet();renderAll();
  toast(`MP: ${aplic} aplicados · ${nuevos} a confirmar · ${ign} ignorados${dup?` · ${dup} repetidos`:""}`);
  if(nuevos)switchTab("caja");
}

function resolveMPSheet(id){
  const it=state.mpInbox.find(x=>String(x.id)===String(id));if(!it)return;
  const same=it.cuit?state.mpInbox.filter(x=>x.cuit===it.cuit):[it];
  openSheet(`<h3>Pago de Mercado Pago</h3>
    <div class="hint">${it.fecha||""} · <b>${money(it.monto)}</b><br>CUIT/CUIL: <b>${it.cuit||"(sin dato)"}</b>${same.length>1?`<br><span class="pos">Hay ${same.length} pagos de este CUIT (${money(same.reduce((s,x)=>s+x.monto,0))})</span>`:""}</div>
    <label class="field">¿De qué cliente es?</label>
    <input type="text" id="mpCli" placeholder="Ej: Rivadavia1400" list="mpClilist">
    <datalist id="mpClilist">${clientsAgg().map(c=>`<option value="${c.name}">`).join("")}</datalist>
    <p class="hint">Lo recuerdo: los próximos pagos de este CUIT se asignan solos.</p>
    <div class="seg" style="margin-top:14px"><button class="sel" id="mpAsig">Asignar${same.length>1?` los ${same.length}`:""}</button><button id="mpIgn">Ignorar</button></div>
    <button id="mpClose" style="margin-top:10px;width:100%">Cancelar</button>`);
  $("#mpClose").onclick=closeSheet;
  $("#mpAsig").onclick=async()=>{
    const nm=$("#mpCli").value.trim();if(!nm){toast("Elegí el cliente");return;}
    const k=key(nm);if(it.cuit)state.mpMap[it.cuit]=k;
    const c=clientsAgg().find(x=>x.key===k);const finalNm=c?c.name:nm;
    const targets=it.cuit?same:[it];const ids=new Set(targets.map(t=>String(t.id)));
    for(const t of targets)state.pagos.push({id:"p"+Date.now()+Math.random().toString(36).slice(2,6),name:finalNm,importe:t.monto,fecha:fechaToStr(t.fecha),metodo:"mp",mpId:String(t.id),mpCuit:t.cuit});
    state.mpInbox=state.mpInbox.filter(x=>!ids.has(String(x.id)));
    await save();closeSheet();renderAll();toast(`Asignado a ${finalNm}`);
  };
  $("#mpIgn").onclick=async()=>{
    if(it.cuit)state.mpMap[it.cuit]="__IGN__";
    const targets=it.cuit?same:[it];const ids=new Set(targets.map(t=>String(t.id)));
    state.mpInbox=state.mpInbox.filter(x=>!ids.has(String(x.id)));
    await save();closeSheet();renderAll();toast("Ignorado");
  };
}

// ---- PIN ----
const PIN_KEY="cargas_pin";
function hashPin(p){let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h+p.charCodeAt(i))>>>0;return "h"+h;}
function pinIsSet(){return !!localStorage.getItem(PIN_KEY);}
let pinMode="unlock",pinBuf="",pinTemp="";
function showPin(mode){
  pinMode=mode;pinBuf="";pinTemp="";
  $("#emailScreen").style.display="none";$("#pinScreen").style.display="block";showLogin();
  $("#pinTitle").textContent=mode==="create"?"Creá tu PIN":"Ingresá tu PIN";
  $("#pinMsg").textContent=mode==="create"?"Elegí 4 números para entrar rápido":"";
  $("#pinerr").textContent="";
  $("#pinForgot").style.display=mode==="unlock"?"block":"none";
  buildPad();drawDots();
}
function drawDots(){$("#pindots").innerHTML=[0,1,2,3].map(i=>`<span class="${i<pinBuf.length?'full':''}"></span>`).join("");}
function buildPad(){
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  $("#pinpad").innerHTML=keys.map(k=>k===""?`<button class="fn" disabled style="visibility:hidden"></button>`:k==="⌫"?`<button class="fn" data-k="del">⌫</button>`:`<button data-k="${k}">${k}</button>`).join("");
  [...document.querySelectorAll("#pinpad button[data-k]")].forEach(b=>b.onclick=()=>pinPress(b.dataset.k));
}
function pinPress(k){
  $("#pinerr").textContent="";
  if(k==="del"){pinBuf=pinBuf.slice(0,-1);drawDots();return;}
  if(pinBuf.length>=4)return;
  pinBuf+=k;drawDots();
  if(pinBuf.length===4)setTimeout(pinComplete,120);
}
function pinComplete(){
  if(pinMode==="unlock"){
    if(hashPin(pinBuf)===localStorage.getItem(PIN_KEY)){pinUnlocked();}
    else{$("#pinerr").textContent="PIN incorrecto";pinBuf="";drawDots();}
  }else{
    if(!pinTemp){pinTemp=pinBuf;pinBuf="";drawDots();$("#pinTitle").textContent="Repetí el PIN";$("#pinMsg").textContent="";}
    else{
      if(pinBuf===pinTemp){localStorage.setItem(PIN_KEY,hashPin(pinBuf));pinUnlocked();}
      else{$("#pinerr").textContent="No coinciden, probá de nuevo";pinTemp="";pinBuf="";drawDots();$("#pinTitle").textContent="Creá tu PIN";$("#pinMsg").textContent="Elegí 4 números para entrar rápido";}
    }
  }
}
